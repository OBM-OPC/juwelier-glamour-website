    <style>
        .thank-you-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 120px 20px 40px;
            background: linear-gradient(135deg, var(--warm-gray) 0%, var(--white) 100%);
        }
        
        .thank-you-content {
            max-width: 600px;
            background: var(--white);
            padding: 60px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        }
        
        .thank-you-icon {
            font-size: 4rem;
            margin-bottom: 24px;
        }
        
        .thank-you-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            margin-bottom: 16px;
            color: var(--black);
        }
        
        .thank-you-text {
            color: rgba(10, 10, 10, 0.7);
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 32px;
        }
        
        .thank-you-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        @media (max-width: 480px) {
            .thank-you-content {
                padding: 40px 24px;
            }
        }
    </style>

                Wir haben Ihre Anfrage erhalten und werden uns schnellstmöglich bei Ihnen melden. 
                Normalerweise antworten wir innerhalb von 24 Stunden.

            <div class="thank-you-buttons">
                <a href="index.html" class="btn btn-primary">Zurück zur Startseite</a>
                <a href="kontakt.html" class="btn btn-secondary">Weitere Nachricht</a>
